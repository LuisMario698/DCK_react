services:
  db:
    image: postgres:16-alpine
    container_name: dck_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dck_db
      POSTGRES_USER: dck_user
      POSTGRES_PASSWORD: dck_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dck_user -d dck_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    image: dck-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dck_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://dck_user:dck_password@db:5432/dck_db
      SESSION_SECRET: dck-super-secret-key-change-in-production!!
      UPLOAD_DIR: /app/uploads
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  studio:
    image: node:20-alpine
    container_name: dck_prisma_studio
    working_dir: /app
    command: >
      sh -c "
        apk add --no-cache openssl &&
        npx prisma studio --port 5555 --browser none
      "
    environment:
      DATABASE_URL: postgresql://dck_user:dck_password@db:5432/dck_db
    volumes:
      - .:/app
    ports:
      - "5555:5555"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
